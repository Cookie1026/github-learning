name: Hello World

on:
  push:
    branches: [ master ]

jobs:
  hello:
    runs-on: ubuntu-latest
    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: Hello を表示
        run: echo "Hello from GitHub Actions!"

      - name: ブランチ名を表示
        run: echo "ブランチ: ${{ github.ref_name }}"
